name: Bug report
description: Report an extraction problem using anonymized sample text.
title: "[Bug]: "
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Do not paste a real private conversation. Replace names and messages with synthetic examples.
  - type: input
    id: platform
    attributes:
      label: Chat platform and client
      placeholder: Discord desktop, Korean
    validations:
      required: true
  - type: textarea
    id: sample
    attributes:
      label: Anonymized copied text
      render: text
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected output
      render: text
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual output
      render: text
    validations:
      required: true
  - type: checkboxes
    id: privacy
    attributes:
      label: Privacy confirmation
      options:
        - label: I removed all real names, messages, IDs, and sensitive information.
          required: true
